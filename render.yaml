services:
  # Backend: Spring Boot Web Service
  - type: web
    name: linkedin-backend
    env: java
    plan: free
    buildCommand: mvn -B package -DskipTests --file backend/pom.xml
    startCommand: java -jar backend/target/*.jar
    envVars:
      - key: DATABASE_URL
        sync: false # Set manually in dashboard
      - key: DATABASE_USERNAME
        sync: false # Set manually in dashboard
      - key: DATABASE_PASSWORD
        sync: false # Set manually in dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: MAIL_USERNAME
        sync: false # Set manually in dashboard
      - key: MAIL_PASSWORD
        sync: false # Set manually in dashboard

  # Frontend: Static Site
  - type: web
    name: linkedin-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    publishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: linkedin-backend
          type: web
          property: host
