services:
  # Backend: Spring Boot Web Service
  - type: web
    name: linkedin-backend
    env: java
    plan: free # Change to starter or higher if needed
    buildCommand: mvn -B package -DskipTests --file backend/pom.xml
    startCommand: java -jar backend/target/*.jar
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: linkedin-db
          property: connectionString
      - key: DATABASE_USERNAME
        fromDatabase:
          name: linkedin-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: linkedin-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: MAIL_USERNAME
        sync: false # Set manually in dashboard
      - key: MAIL_PASSWORD
        sync: false # Set manually in dashboard

  # Frontend: Static Site
  - type: web
    name: linkedin-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    publishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: linkedin-backend
          type: web
          property: host

databases:
  # Managed PostgreSQL (Easiest for Render free tier)
  - name: linkedin-db
    databaseName: linkedin_clone
    user: admin
    plan: free
