services:
  # Backend: Spring Boot Web Service
  - type: web
    name: linkedin-backend
    env: java
    plan: free
    rootDir: backend
    buildCommand: mvn -B package -DskipTests
    startCommand: java -jar target/*.jar
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_USERNAME
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false

  # Frontend: Static Site
  - type: web
    name: linkedin-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: linkedin-backend
          type: web
          property: host
